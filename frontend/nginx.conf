server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Off by default on the base nginx image — the CSS bundle alone is
    # 52.5 KB raw vs 9.8 KB gzipped (81% smaller), and it's on the
    # render-blocking critical path for first paint.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Hashed build assets (Vite renames the file on any content change) can be
    # cached forever — the filename itself is the cache key.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html carries the router — without no-cache, browsers can keep
    # serving a stale build (old routes, old auth logic) indefinitely since
    # there's no hashed filename to bust here.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
