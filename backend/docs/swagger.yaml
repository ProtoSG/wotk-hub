        "502":
          description: download failed
          schema:
            $ref: '#/definitions/httpx.APIError'
      security:
      - BearerAuth: []
      summary: Download a YouTube video as MP3 (public, token-gated)
      tags:
      - ytdlp
securityDefinitions:
  BearerAuth:
    description: Static token used by CLI and public share routes, sent as "Bearer
      <token>".
    in: header
    name: Authorization
    type: apiKey
  CookieAuth:
    description: JWT access token issued by /api/auth/login, sent as the access_token
      cookie (not an Authorization header — see middleware.JWTAuth).
    in: cookie
    name: access_token
    type: apiKey
swagger: "2.0"
