  /ytdlp/public/download:
    post:
      consumes:
      - application/json
      description: 'Same as Download but gated by a shared-secret token instead of
        JWT login — for sharing with someone without an account. Token travels as
        ?token= or an Authorization: Bearer header. Only mounted when YTDLP_PUBLIC_TOKEN
        is set.'
      parameters:
      - description: Shared-secret token (alternative to the Authorization header)
        in: query
        name: token
        type: string
      - description: YouTube URL
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ytdlp.downloadRequest'
