        type: string
      id:
        type: integer
      key:
        type: string
      name:
        type: string
    type: object
  auth.apiKeyView:
    properties:
      created_at:
        type: string
      id:
        type: integer
      last_used_at:
        type: string
      name:
        type: string
      revoked_at:
