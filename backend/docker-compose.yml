services:
  postgres:
    image: postgres:16-alpine
    container_name: workhub-pg
    environment:
      POSTGRES_USER: workhub
      POSTGRES_PASSWORD: workhub
      POSTGRES_DB: workhub
    ports:
      - "5432:5432"
    volumes:
      - workhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workhub -d workhub"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  workhub_pgdata:
